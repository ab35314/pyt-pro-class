<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雲端共享投票系統</title>
    <style>
        /* CSS：美化網頁外觀 */
        body {
            font-family: "Microsoft JhengHei", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }

        .vote-card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            width: 380px;
        }

        h2 { color: #333; margin-bottom: 5px; }
        p.subtitle { color: #666; font-size: 14px; margin-bottom: 25px; }

        /* 結果顯示區域 */
        .results {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: left;
            display: none; /* 點擊後顯示 */
        }

        .result-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .progress-bg {
            background-color: #e9ecef;
            border-radius: 10px;
            height: 12px;
            width: 100%;
            margin-bottom: 15px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            transition: width 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .bg-agree { background-color: #2ecc71; }
        .bg-disagree { background-color: #e74c3c; }

        /* 按鈕群組 */
        .button-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .btn {
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            color: white;
        }

        .btn:active { transform: scale(0.95); }
        .btn:disabled { background-color: #ccc; cursor: not-allowed; }

        .btn-agree { background-color: #2ecc71; }
        .btn-disagree { background-color: #e74c3c; }
        .btn-show { background-color: #3498db; }
        .btn-reset { background-color: #95a5a6; }

        .full-width { grid-column: span 2; }
        
        #msg { margin-top: 15px; font-size: 13px; color: #888; }
    </style>
</head>
<body>

    <div class="vote-card">
        <h2>即時表決系統</h2>
        <p class="subtitle">數據將即時同步至雲端資料庫</p>

        <!-- 視覺化圖表區 -->
        <div id="result-area" class="results">
            <div class="result-label">
                <span>✅ 同意</span>
                <span id="label-agree">0%</span>
            </div>
            <div class="progress-bg">
                <div id="bar-agree" class="progress-fill bg-agree"></div>
            </div>

            <div class="result-label">
                <span>❌ 不同意</span>
                <span id="label-disagree">0%</span>
            </div>
            <div class="progress-bg">
                <div id="bar-disagree" class="progress-fill bg-disagree"></div>
            </div>
        </div>

        <!-- 功能按鈕區 -->
        <div class="button-grid">
            <button id="btn-agree" class="btn btn-agree" onclick="castVote('同意')">同意</button>
            <button id="btn-disagree" class="btn btn-disagree" onclick="castVote('不同意')">不同意</button>
            <button class="btn btn-show full-width" onclick="toggleDisplay()">檢視/更新統計結果</button>
            <button class="btn btn-reset full-width" onclick="resetLocal()">重製票箱 (僅限本機)</button>
        </div>

        <div id="msg">尚未投票</div>
    </div>

    <!-- 隱藏的 iframe 用於提交 Google 表單而不跳轉頁面 -->
    <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;"></iframe>

    <script>
        // 配置資訊
        const FORM_ID = "1NoXPV12EXLOsfg-QNBMKRcs7BUlQmi3geGCn-IWzqDQ";
        const ENTRY_ID = "entry.1237221277";

        // 初始化資料 (嘗試從本機讀取舊資料)
        let votes = JSON.parse(localStorage.getItem('vote_backup')) || { agree: 0, disagree: 0 };

        // 頁面載入時先更新一次
        updateUI();

        function castVote(choice) {
            // 1. 本地邏輯更新
            if (choice === '同意') votes.agree++;
            else votes.disagree++;
            
            localStorage.setItem('vote_backup', JSON.stringify(votes));
            updateUI();

            // 2. 偷偷送出到 Google 表單
            const actionUrl = `https://docs.google.com/forms/d/e/${FORM_ID}/formResponse`;
            const submitUrl = `${actionUrl}?${ENTRY_ID}=${encodeURIComponent(choice)}&submit=Submit`;
            
            // 透過 iframe 送出，頁面不會閃動
            document.getElementById('hidden_iframe').src = submitUrl;

            // 3. UI 反饋
            alert(`投票成功！您選擇了：${choice}`);
            document.getElementById('btn-agree').disabled = true;
            document.getElementById('btn-disagree').disabled = true;
            document.getElementById('msg').innerText = "您已完成雲端投票同步";
        }

        function toggleDisplay() {
            const area = document.getElementById('result-area');
            if (area.style.display === 'block') {
                area.style.display = 'none';
            } else {
                area.style.display = 'block';
                updateUI();
                // 提供查看雲端總表的連結
                if(confirm("想去 Google 表單查看雲端所有人的統計總結嗎？")) {
                    window.open(`https://docs.google.com/forms/d/e/${FORM_ID}/viewanalytics`);
                }
            }
        }

        function updateUI() {
            const total = votes.agree + votes.disagree;
            const aP = total === 0 ? 0 : Math.round((votes.agree / total) * 100);
            const dP = total === 0 ? 0 : Math.round((votes.disagree / total) * 100);

            document.getElementById('label-agree').innerText = `${aP}% (${votes.agree}票)`;
            document.getElementById('label-disagree').innerText = `${dP}% (${votes.disagree}票)`;
            
            document.getElementById('bar-agree').style.width = aP + "%";
            document.getElementById('bar-disagree').style.width = dP + "%";
        }

        function resetLocal() {
            if (confirm("這只會清空您目前瀏覽器上的顯示紀錄，雲端數據不會被刪除。確定嗎？")) {
                votes = { agree: 0, disagree: 0 };
                localStorage.removeItem('vote_backup');
                location.reload();
            }
        }
    </script>
</body>
</html>
